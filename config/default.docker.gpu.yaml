# Docker config (GPU profile)
models:
  dinov3:
    path: "/app/models/dinov3-vitl16-pretrain-sat493m"
    patch_size: 16
    num_register_tokens: 4
    hidden_size: 1024
    num_layers: 24
    extract_layers: [6, 12, 18, 24]
    norm_mean: [0.430, 0.411, 0.296]
    norm_std: [0.213, 0.156, 0.143]

  sam3:
    checkpoint: "/app/models/sam3/sam3.pt"
    bpe_path: null
    resolution: 1008
    confidence_threshold: 0.5

data:
  bands: ["R", "G", "B"]
  tile_size: 512
  tile_overlap: 64
  min_labeled_fraction: 0.05
  background_class_id: 1
  ignore_index: 0
  val_fraction: 0.15
  test_fraction: 0.15
  split_block_size: 500.0

training:
  epochs: 50
  batch_size: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  scheduler: "cosine"
  warmup_epochs: 5
  mixed_precision: true
  freeze_backbone: true
  fpn_channels: 256
  neck_out_channels: [256, 512, 1024, 1024]
  neck_scale_factors: [4.0, 2.0, 1.0, 0.5]
  early_stopping_patience: 10
  early_stopping_monitor: "val_mIoU"
  augmentations:
    horizontal_flip: true
    vertical_flip: true
    rotate90: true
    color_jitter: true
    random_scale: [0.5, 2.0]

inference:
  tile_size: 512
  tile_overlap: 128
  batch_size: 8
  output_confidence: true
  output_vectors: true
  vector_simplify_tolerance: 1.0

paths:
  project_dir: "/app/projects"
  checkpoint_dir: "/app/checkpoints"
  dataset_cache_dir: "/app/dataset_cache"
  tile_cache_dir: "/app/tile_cache"

server:
  host: "0.0.0.0"
  port: 8000
  dashboard_port: 7860

gpu:
  device: "cuda"
  max_vram_gb: 22
